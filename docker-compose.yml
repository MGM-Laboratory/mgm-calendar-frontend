services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle. Browser hits this URL directly,
        # so it must be reachable from the user's machine (typically the
        # backend repo's published port: http://localhost:8080).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
